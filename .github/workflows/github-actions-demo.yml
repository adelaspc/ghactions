name: CI
run-name: testing 
on: 
  push:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install 
      - run: npm run lint 
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup node
        uses: actions/setup-node@v4
        with: 
          node-version: 22
      
      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

  
