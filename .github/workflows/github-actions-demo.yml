name: CI
run-name: new-test
on: 
  push: 
env:
  APP_ENV: ci 
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install 
      - run: npm run lint 
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup node
        uses: actions/setup-node@v4
        with: 
          node-version: 22
          cache: npm
      
      - name: Install Dependencies
        run: npm ci 

      - name: Run Tests
        run: npm test

      - name: Print env
        run: echo "Ruinning in $APP_ENV"

  
